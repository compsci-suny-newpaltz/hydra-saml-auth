# Dev-only: expose mock SAML IdP as NodePort for browser access
apiVersion: v1
kind: Service
metadata:
  name: mock-saml-idp-external
  namespace: hydra-system
spec:
  type: NodePort
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30080
  selector:
    app.kubernetes.io/name: mock-saml-idp
