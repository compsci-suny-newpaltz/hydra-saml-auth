# Mock SAML IdP for local development
# Uses SimpleSAMLphp for testing authentication flows
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-saml-idp
  namespace: hydra-system
  labels:
    app.kubernetes.io/name: mock-saml-idp
    app.kubernetes.io/component: dev-mock
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mock-saml-idp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mock-saml-idp
    spec:
      containers:
        - name: saml-idp
          image: kristophjunge/test-saml-idp:1.15
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SIMPLESAMLPHP_SP_ENTITY_ID
              value: "hydra.local"
            - name: SIMPLESAMLPHP_SP_ASSERTION_CONSUMER_SERVICE
              value: "http://localhost:6969/login/callback"
            - name: SIMPLESAMLPHP_BASEURLPATH
              value: "http://mock-saml-idp:8080/simplesaml/"
          volumeMounts:
            - name: saml-users
              mountPath: /var/www/simplesamlphp/config/authsources.php
              subPath: authsources.php
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: saml-users
          configMap:
            name: mock-saml-users
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mock-saml-users
  namespace: hydra-system
data:
  authsources.php: |
    <?php
    $config = [
        'admin' => [
            'core:AdminPassword',
        ],
        'example-userpass' => [
            'exampleauth:UserPass',
            'admin:password' => [
                'uid' => ['admin'],
                'email' => ['admin@example.com'],
                'givenName' => ['Admin'],
                'sn' => ['User'],
                'displayName' => ['Admin User'],
                'groups' => ['faculty', 'staff'],
            ],
            'student:password' => [
                'uid' => ['student'],
                'email' => ['student@example.com'],
                'givenName' => ['Test'],
                'sn' => ['Student'],
                'displayName' => ['Test Student'],
                'groups' => ['students'],
            ],
        ],
    ];
---
apiVersion: v1
kind: Service
metadata:
  name: mock-saml-idp
  namespace: hydra-system
  labels:
    app.kubernetes.io/name: mock-saml-idp
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  selector:
    app.kubernetes.io/name: mock-saml-idp
