# Mock GPU Node Metrics — simulates Chimera and Cerberus for dashboard
# Uses the mock-metrics-server.js from dev/ embedded as ConfigMap
---
# Chimera: 3x RTX 3090, inference node
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-chimera
  namespace: hydra-system
  labels:
    app.kubernetes.io/name: mock-chimera
    app.kubernetes.io/component: dev-mock
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mock-chimera
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mock-chimera
    spec:
      containers:
        - name: metrics
          image: node:18-alpine
          command: ["node", "/app/mock-metrics-server.js"]
          ports:
            - name: http
              containerPort: 9100
          env:
            - name: NODE_NAME
              value: "chimera"
            - name: NODE_ROLE
              value: "inference"
            - name: GPU_COUNT
              value: "3"
            - name: GPU_MODEL
              value: "RTX 3090"
            - name: GPU_VRAM
              value: "24"
            - name: RAM_TOTAL
              value: "251"
            - name: DISK_TOTAL
              value: "3500"
            - name: PORT
              value: "9100"
          volumeMounts:
            - name: app
              mountPath: /app
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
      volumes:
        - name: app
          configMap:
            name: mock-metrics-script
---
apiVersion: v1
kind: Service
metadata:
  name: mock-chimera
  namespace: hydra-system
  labels:
    app.kubernetes.io/name: mock-chimera
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 9100
      targetPort: 9100
  selector:
    app.kubernetes.io/name: mock-chimera
---
# Cerberus: 2x RTX 5090, training node
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-cerberus
  namespace: hydra-system
  labels:
    app.kubernetes.io/name: mock-cerberus
    app.kubernetes.io/component: dev-mock
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mock-cerberus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mock-cerberus
    spec:
      containers:
        - name: metrics
          image: node:18-alpine
          command: ["node", "/app/mock-metrics-server.js"]
          ports:
            - name: http
              containerPort: 9100
          env:
            - name: NODE_NAME
              value: "cerberus"
            - name: NODE_ROLE
              value: "training"
            - name: GPU_COUNT
              value: "2"
            - name: GPU_MODEL
              value: "RTX 5090"
            - name: GPU_VRAM
              value: "32"
            - name: RAM_TOTAL
              value: "64"
            - name: DISK_TOTAL
              value: "5300"
            - name: PORT
              value: "9100"
          volumeMounts:
            - name: app
              mountPath: /app
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
      volumes:
        - name: app
          configMap:
            name: mock-metrics-script
---
apiVersion: v1
kind: Service
metadata:
  name: mock-cerberus
  namespace: hydra-system
  labels:
    app.kubernetes.io/name: mock-cerberus
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 9100
      targetPort: 9100
  selector:
    app.kubernetes.io/name: mock-cerberus
---
# Shared metrics script as ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: mock-metrics-script
  namespace: hydra-system
data:
  mock-metrics-server.js: |
    const http = require('http');
    const NODE_NAME = process.env.NODE_NAME || 'unknown';
    const NODE_ROLE = process.env.NODE_ROLE || 'worker';
    const GPU_COUNT = parseInt(process.env.GPU_COUNT || '0');
    const GPU_MODEL = process.env.GPU_MODEL || 'Unknown GPU';
    const GPU_VRAM = parseInt(process.env.GPU_VRAM || '24');
    const RAM_TOTAL = parseInt(process.env.RAM_TOTAL || '64');
    const DISK_TOTAL = parseInt(process.env.DISK_TOTAL || '1000');
    const PORT = parseInt(process.env.PORT || '9100');

    function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

    function gpuMetrics() {
      const gpus = [];
      for (let i = 0; i < GPU_COUNT; i++) {
        const base = NODE_ROLE === 'training' ? 85 : 40;
        const v = NODE_ROLE === 'training' ? 15 : 35;
        const util = Math.min(100, rand(base - v, base + v));
        gpus.push({
          index: i, name: GPU_MODEL,
          utilization_percent: util,
          memory_used_gb: Math.round((util / 100) * GPU_VRAM * (0.7 + Math.random() * 0.3)),
          memory_total_gb: GPU_VRAM,
          temperature_c: rand(55, 82),
          power_draw_w: Math.round(util * 3.5),
          fan_speed_percent: rand(40, 70)
        });
      }
      return gpus;
    }

    const server = http.createServer((req, res) => {
      if (req.url === '/metrics') {
        res.writeHead(200, { 'Content-Type': 'application/json' });
        res.end(JSON.stringify({
          hostname: NODE_NAME, role: NODE_ROLE,
          timestamp: new Date().toISOString(),
          gpus: gpuMetrics(),
          system: {
            cpu_percent: rand(15, 65),
            ram_used_gb: Math.round(RAM_TOTAL * (0.3 + Math.random() * 0.4)),
            ram_total_gb: RAM_TOTAL,
            disk_used_gb: Math.round(DISK_TOTAL * (0.4 + Math.random() * 0.3)),
            disk_total_gb: DISK_TOTAL,
            uptime_hours: rand(100, 2000)
          },
          containers: { running: rand(2, 12), paused: 0, stopped: rand(0, 5) },
          queue: { pending: rand(0, 5), estimated_wait_minutes: rand(10, 90) }
        }));
      } else if (req.url === '/health') {
        res.writeHead(200, { 'Content-Type': 'application/json' });
        res.end(JSON.stringify({ status: 'healthy', node: NODE_NAME }));
      } else {
        res.writeHead(404);
        res.end('Not Found');
      }
    });

    server.listen(PORT, '0.0.0.0', () => {
      console.log(`[${NODE_NAME}] Mock metrics on :${PORT} (${GPU_COUNT}x ${GPU_MODEL})`);
    });
