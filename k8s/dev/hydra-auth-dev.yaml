# Dev hydra-auth deployment — simplified from production
# No hostAliases, no nodeSelector, imagePullPolicy: Never
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hydra-auth
  namespace: hydra-system
  labels:
    app.kubernetes.io/name: hydra
    app.kubernetes.io/component: auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hydra
      app.kubernetes.io/component: auth
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hydra
        app.kubernetes.io/component: auth
    spec:
      serviceAccountName: hydra-auth
      dnsPolicy: ClusterFirst
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: hydra-auth
          image: hydra-saml-auth:dev
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 6969
              protocol: TCP
          env:
            - name: PORT
              value: "6969"
            - name: NODE_ENV
              value: "development"
            - name: ORCHESTRATOR
              value: "kubernetes"
            - name: K8S_IN_CLUSTER
              value: "true"
            - name: K8S_NAMESPACE
              value: "hydra-students"
            - name: K8S_SYSTEM_NAMESPACE
              value: "hydra-system"
            - name: K8S_STORAGE_CLASS
              value: "local-path"
          envFrom:
            - configMapRef:
                name: hydra-auth-config
            - secretRef:
                name: hydra-auth-secrets
          volumeMounts:
            - name: jwt-keys
              mountPath: /app/jwt-keys
              readOnly: true
            - name: data
              mountPath: /app/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: jwt-keys
          secret:
            secretName: hydra-jwt-keys
        - name: data
          persistentVolumeClaim:
            claimName: hydra-auth-data
