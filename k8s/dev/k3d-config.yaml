# k3d cluster configuration for Hydra development
# Mirrors production 3-node RKE2 cluster topology
# Usage: k3d cluster create --config k3d-config.yaml
apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: hydra-dev
servers: 1
agents: 2
# Match production RKE2 version (k3s is the upstream of RKE2)
image: rancher/k3s:v1.28.4-k3s1
ports:
  # Hydra auth (NodePort 30969)
  - port: 6969:30969
    nodeFilters:
      - loadbalancer
  # HTTP traffic (Traefik)
  - port: 8090:80
    nodeFilters:
      - loadbalancer
  # Traefik dashboard
  - port: 8091:8080
    nodeFilters:
      - loadbalancer
  # Mock SAML IdP (NodePort 30080)
  - port: 8080:30080
    nodeFilters:
      - loadbalancer
registries:
  create:
    name: hydra-registry.localhost
    host: "0.0.0.0"
    hostPort: "5050"
volumes:
  - volume: hydra-student-data:/var/lib/rancher/k3s/storage
    nodeFilters:
      - server:*
      - agent:*
options:
  k3d:
    wait: true
    timeout: "300s"
  k3s:
    extraArgs:
      # Match production cluster CIDRs
      - arg: --cluster-cidr=10.42.0.0/16
        nodeFilters: [server:*]
      - arg: --service-cidr=10.43.0.0/16
        nodeFilters: [server:*]
      # Disable built-in traefik and servicelb (we deploy our own)
      - arg: --disable=traefik
        nodeFilters: [server:*]
      - arg: --disable=servicelb
        nodeFilters: [server:*]

      # --- Node labels (mirrors production RKE2 cluster) ---

      # Server = Hydra (control-plane)
      - arg: --node-label=hydra.node-role=control-plane
        nodeFilters: [server:*]
      - arg: --node-label=hydra.student-schedulable=true
        nodeFilters: [server:*]
      - arg: --node-label=kubernetes.io/hostname=hydra
        nodeFilters: [server:*]

      # Agent 0 = Chimera (GPU inference, 3x RTX 3090)
      - arg: --node-label=hydra.node-role=inference
        nodeFilters: [agent:0]
      - arg: --node-label=hydra.gpu-enabled=true
        nodeFilters: [agent:0]
      - arg: --node-label=hydra.student-schedulable=true
        nodeFilters: [agent:0]
      - arg: --node-label=kubernetes.io/hostname=chimera
        nodeFilters: [agent:0]

      # Agent 1 = Cerberus (GPU training, 2x RTX 5090)
      - arg: --node-label=hydra.node-role=training
        nodeFilters: [agent:1]
      - arg: --node-label=hydra.gpu-enabled=true
        nodeFilters: [agent:1]
      - arg: --node-label=hydra.student-schedulable=true
        nodeFilters: [agent:1]
      - arg: --node-label=kubernetes.io/hostname=cerberus
        nodeFilters: [agent:1]
  kubeconfig:
    updateDefaultKubeconfig: true
    switchCurrentContext: true
